<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - BABA JAAN MART</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .shop-container { display:flex; gap:30px; padding:30px 5%; }
    .filter-sidebar { width:250px; background:white; padding:20px; border-radius:8px; height:fit-content; }
    .filter-section { margin-bottom:20px; padding-bottom:25px; border-bottom:1px solid var(--border-color); }
    .filter-section h4 { margin-bottom:12px; font-size:14px; text-transform:uppercase; }
    .filter-options label { display:block; margin-bottom:8px; font-size:14px; cursor:pointer; }
    .content-area { flex:1; }
    .sort-container { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .product-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:20px; }
    .product-card { background:white; border-radius:10px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    .product-card img { width:100%; height:300px; object-fit:cover; }
    .product-info { padding:15px; }
    .product-info h3 { margin-bottom:10px; font-size:18px; }
    .old-price { text-decoration:line-through; color:gray; }
    .current-price { font-weight:bold; margin-left:10px; color:black; }
    .view-btn { width:100%; padding:12px; background:black; color:white; border:none; border-radius:6px; cursor:pointer; margin-top:10px; }
  </style>
</head>

<body>

  <div class="shop-container">
    <aside class="filter-sidebar">
      <h3>Filters</h3>
      <hr style="margin:10px 0; border:0; border-top:1px solid var(--border-color);">

      <div class="filter-section">
        <h4>Category</h4>
        <div class="filter-options">
          <label><input type="checkbox" value="Jeans"> Jeans</label>
          <label><input type="checkbox" value="Shirts"> Shirts</label>
          <label><input type="checkbox" value="T-Shirt"> T-Shirts</label>
          <label><input type="checkbox" value="Pants"> Cargo & Linen Pants</label>
        </div>
      </div>

      <div class="filter-section">
        <h4>Size</h4>
        <div class="filter-options">
          <label><input type="checkbox" value="M"> M</label>
          <label><input type="checkbox" value="L"> L</label>
          <label><input type="checkbox" value="XL"> XL</label>
          <label><input type="checkbox" value="30"> 30</label>
          <label><input type="checkbox" value="32"> 32</label>
        </div>
      </div>

      <div class="filter-section">
        <h4>Price Range</h4>
        <input type="range" min="200" max="5000" step="100" style="width:100%;">
        <div style="display:flex; justify-content:space-between; font-size:12px; margin-top:5px;">
          <span>₹200</span><span>₹5,000+</span>
        </div>
      </div>
    </aside>

    <main class="content-area">
      <div class="sort-container">
        <span style="font-weight:600;" id="item-count">Loading Products...</span>

        <select id="sortSelect" onchange="sortProducts()" style="padding:8px; border-radius:4px; border:1px solid var(--border-color);">
          <option value="newest">Sort By: Newest</option>
          <option value="low-high">Price: Low to High</option>
          <option value="high-low">Price: High to Low</option>
        </select>
      </div>

      <div class="product-grid" id="shop-product-grid"></div>
    </main>
  </div>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://kwslileixrznlycqjqoj.supabase.co",
      "sb_publishable_gFXTHh-8OEcI5O-YbAT9rQ_n5LJTTMv"
    );

    let allProducts = [];

    async function loadProducts() {
      const grid = document.getElementById("shop-product-grid");
      const itemCount = document.getElementById("item-count");

      grid.innerHTML = "<h3>Loading Products...</h3>";

      const { data, error } = await supabaseClient
        .from("products")
        .select("*")
        .order("id", { ascending:false });

      if (error) {
        console.log(error);
        grid.innerHTML = "<h3>Products load nahi hue.</h3>";
        itemCount.innerText = "Error loading products";
        return;
      }

      allProducts = data || [];
      renderProducts(allProducts);
    }

    function renderProducts(products) {
      const grid = document.getElementById("shop-product-grid");
      const itemCount = document.getElementById("item-count");

      itemCount.innerText = `Showing ${products.length} Products`;

      if (products.length === 0) {
        grid.innerHTML = "<h3>No products found.</h3>";
        return;
      }

      let html = "";

      products.forEach(product => {
        html += `
          <div class="product-card">
            <img src="${product.image_url}" alt="${product.name}">

            <div class="product-info">
              <h3>${product.name || "Product"}</h3>

              <p>
                <span class="old-price">₹${product.old_price || 0}</span>
                <span class="current-price">₹${product.price || 0}</span>
              </p>

              <p>Category: ${product.category || "-"}</p>
              <p>Size: ${product.size || "-"}</p>
              <p>Stock: ${product.stock || 0}</p>

              <button class="view-btn" onclick="viewProduct(${product.id})">
                View Product
              </button>
            </div>
          </div>
        `;
      });

      grid.innerHTML = html;
    }

    function viewProduct(productId) {
      localStorage.setItem("selectedProductId", productId);
      window.location.href = "product-detail.html";
    }

    function sortProducts() {
      const sortValue = document.getElementById("sortSelect").value;
      let products = [...allProducts];

      if (sortValue === "low-high") {
        products.sort((a, b) => Number(a.price || 0) - Number(b.price || 0));
      }

      if (sortValue === "high-low") {
        products.sort((a, b) => Number(b.price || 0) - Number(a.price || 0));
      }

      if (sortValue === "newest") {
        products.sort((a, b) => Number(b.id || 0) - Number(a.id || 0));
      }

      renderProducts(products);
    }

    loadProducts();
  </script>

</body>
</html>
