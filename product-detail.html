<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Shirt Detail - BABA JAAN MART</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    .detail-container { display: flex; gap: 40px; padding: 40px 5%; background: white; border-radius:8px; margin: 20px 5%; }
    .gallery-panel { display: flex; gap: 15px; flex: 1; }
    .thumb-images { display: flex; flex-direction: column; gap: 10px; }
    .thumb-images img { width: 80px; height: 100px; object-fit: cover; cursor: pointer; border: 1px solid var(--border-color); }
    .main-image img { width: 100%; max-height: 600px; object-fit: cover; }
    .info-panel { flex: 1; }
    .size-btn { padding: 10px 20px; border: 1px solid var(--border-color); background:none; cursor:pointer; font-weight:600; }
    .size-btn.active { border-color: var(--primary-color); background: var(--accent-color); }
    .pincode-box { display: flex; gap: 10px; margin-top: 15px; }
    .pincode-box input { padding: 10px; border: 1px solid var(--border-color); border-radius:4px; }
  </style>
</head>

<body>
  <div class="detail-container">
    <div class="gallery-panel">
      <div class="thumb-images">
        <img src="https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=500" onclick="document.getElementById('main-view').src=this.src">
        <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=500" onclick="document.getElementById('main-view').src=this.src">
      </div>

      <div class="main-image">
        <img id="main-view" src="https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=500">
      </div>
    </div>

    <div class="info-panel">
      <h2>Pure Linen Casual White Shirt</h2>

      <div class="rating-badge" style="margin: 10px 0;">
        4.5 <i class="fa-solid fa-star"></i>
      </div>

      <hr style="border:0; border-top:1px solid var(--border-color); margin:15px 0;">

      <div class="price-container" style="font-size:24px;">
        <span class="current-price" style="font-size:28px;">₹999</span>
        <span class="old-price">₹1,999</span>
        <span class="discount-tag">(50% OFF)</span>
      </div>

      <p style="color:green; font-weight:bold; font-size:14px;">Inclusive of all taxes</p>

      <div style="margin: 20px 0;">
        <h4 style="margin-bottom:10px;">Select Size</h4>

        <div style="display:flex; gap:10px;">
          <button class="size-btn" onclick="selectSize(this, 'M')">M</button>
          <button class="size-btn active" onclick="selectSize(this, 'L')">L</button>
          <button class="size-btn" onclick="selectSize(this, 'XL')">XL</button>
          <button class="size-btn" onclick="selectSize(this, 'XXL')">XXL</button>
        </div>
      </div>

      <button class="btn-add-cart" style="padding:15px; font-size:16px;" onclick="addToCart()">
        ADD TO BAG
      </button>

      <div style="margin-top: 30px;">
        <h4>Delivery Options</h4>

        <div class="pincode-box">
          <input type="text" id="pincode" placeholder="Enter Pincode">
          <button style="padding:10px 20px; background:#000; color:#fff; border:none; border-radius:4px; cursor:pointer;" onclick="checkPincode()">
            Check
          </button>
        </div>

        <p id="pincode-status" style="font-size:13px; margin-top:5px; color:var(--text-muted);"></p>
      </div>

      <div style="margin-top: 30px; font-size:14px;">
        <p><strong>Fabric:</strong> 100% Premium Linen</p>
        <p><strong>Fit:</strong> Regular Fit</p>
        <p><strong>Return Policy:</strong> Easy 7 days return and exchange available.</p>
      </div>
    </div>
  </div>

  <script>
    let selectedSize = "L";

    function selectSize(button, size) {
      selectedSize = size;

      const buttons = document.querySelectorAll(".size-btn");
      buttons.forEach(btn => btn.classList.remove("active"));

      button.classList.add("active");
    }

    function addToCart() {
      const product = {
        name: "Pure Linen Casual White Shirt",
        price: 1,
        oldPrice: 1999,
        size: selectedSize,
        quantity: 1,
        image: document.getElementById("main-view").src,
        link: "https://babajanmart.com/product-detail.html"
      };

      localStorage.setItem("cartItem", JSON.stringify(product));

      window.location.href = "cart.html";
    }

    function checkPincode() {
      let pin = document.getElementById("pincode").value;
      let status = document.getElementById("pincode-status");

      if (pin === "222139" || pin.startsWith("222")) {
        status.innerText = "Fast Delivery available to Khetasarai & nearby areas!";
        status.style.color = "green";
      } else if (pin.length === 6) {
        status.innerText = "Delivery available within 4-7 days.";
        status.style.color = "blue";
      } else {
        status.innerText = "Please enter a valid 6 digit Indian pincode.";
        status.style.color = "red";
      }
    }
  </script>
</body>
</html>
