<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail - BABA JAAN MART</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .detail-container {
      display: flex;
      gap: 40px;
      padding: 40px 5%;
      background: white;
      border-radius: 8px;
      margin: 20px 5%;
    }

    .gallery-panel {
      display: flex;
      gap: 15px;
      flex: 1;
    }

    .thumb-images {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .thumb-images img {
      width: 70px;
      height: 90px;
      object-fit: cover;
      cursor: pointer;
      border: 1px solid var(--border-color);
      border-radius: 5px;
    }

    .main-image {
      width: 100%;
    }

    .main-image img {
      width: 100%;
      height: 430px;
      object-fit: cover;
      border-radius: 8px;
    }

    .info-panel {
      flex: 1;
    }

    .size-btn {
      padding: 10px 20px;
      border: 1px solid var(--border-color);
      background: none;
      cursor: pointer;
      font-weight: 600;
      border-radius: 4px;
    }

    .size-btn.active {
      border-color: var(--primary-color);
      background: var(--accent-color);
    }

    .pincode-box {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .pincode-box input {
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
    }

    @media(max-width: 768px) {
      .detail-container {
        flex-direction: column;
      }

      .gallery-panel {
        flex-direction: column;
      }

      .thumb-images {
        flex-direction: row;
      }

      .main-image img {
        height: 320px;
      }
    }
  </style>
</head>

<body>

  <div class="detail-container">

    <div class="gallery-panel">
      <div class="thumb-images" id="thumbImages"></div>

      <div class="main-image">
        <img id="main-view" src="" alt="Product Image">
      </div>
    </div>

    <div class="info-panel">
      <h2 id="productName">Loading...</h2>

      <div class="rating-badge" style="margin: 10px 0;">
        4.5 <i class="fa-solid fa-star"></i>
      </div>

      <hr style="border:0; border-top:1px solid var(--border-color); margin:15px 0;">

      <div class="price-container" style="font-size:24px;">
        <span class="current-price" id="productPrice" style="font-size:28px;">₹0</span>
        <span class="old-price" id="oldPrice">₹0</span>
        <span class="discount-tag">(Offer)</span>
      </div>

      <p style="color:green; font-weight:bold; font-size:14px;">
        Inclusive of all taxes
      </p>

      <div style="margin: 20px 0;">
        <h4 style="margin-bottom:10px;">Select Size</h4>
        <div style="display:flex; gap:10px; flex-wrap:wrap;" id="sizeBox"></div>
      </div>

      <button class="btn-add-cart" style="padding:15px; font-size:16px;" onclick="addToCart()">
        ADD TO BAG
      </button>

      <div style="margin-top: 30px;">
        <h4>Delivery Options</h4>

        <div class="pincode-box">
          <input type="text" id="pincode" placeholder="Enter Pincode">

          <button style="padding:10px 20px; background:#000; color:#fff; border:none; border-radius:4px; cursor:pointer;" onclick="checkPincode()">
            Check
          </button>
        </div>

        <p id="pincode-status" style="font-size:13px; margin-top:5px; color:var(--text-muted);"></p>
      </div>

      <div style="margin-top: 30px; font-size:14px;">
        <p><strong>Description:</strong></p>
        <p id="productDescription">Loading product details...</p>
        <p><strong>Return Policy:</strong> Easy 7 days return and exchange available.</p>
      </div>
    </div>
  </div>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://kwslileixrznlycqjqoj.supabase.co",
      "sb_publishable_gFXTHh-8OEcI5O-YbAT9rQ_n5LJTTMv"
    );

    let selectedSize = "";
    let currentProduct = null;

    async function loadProduct() {
      const productId = localStorage.getItem("selectedProductId");

      if (!productId) {
        alert("Product not selected.");
        window.location.href = "shop.html";
        return;
      }

      const { data, error } = await supabaseClient
        .from("products")
        .select("*")
        .eq("id", productId)
        .single();

      if (error || !data) {
        console.log(error);
        alert("Product load nahi hua.");
        window.location.href = "shop.html";
        return;
      }

      currentProduct = data;

      document.getElementById("productName").innerText = data.name || "Product";
      document.getElementById("productPrice").innerText = `₹${data.price || 0}`;
      document.getElementById("oldPrice").innerText = `₹${data.old_price || data.price || 0}`;
      document.getElementById("productDescription").innerText = data.description || "Premium quality product from Baba Jaan Mart.";

      const imageUrl = data.image_url || "https://via.placeholder.com/500";
      document.getElementById("main-view").src = imageUrl;

      document.getElementById("thumbImages").innerHTML = `
        <img src="${imageUrl}" onclick="document.getElementById('main-view').src=this.src">
      `;

      const sizes = data.size
        ? data.size.split(",").map(s => s.trim())
        : ["M", "L", "XL"];

      selectedSize = sizes[0];

      let sizeHtml = "";

      sizes.forEach((size, index) => {
        sizeHtml += `
          <button
            class="size-btn ${index === 0 ? "active" : ""}"
            onclick="selectSize(this, '${size}')">
            ${size}
          </button>
        `;
      });

      document.getElementById("sizeBox").innerHTML = sizeHtml;
    }

    function selectSize(button, size) {
      selectedSize = size;

      const buttons = document.querySelectorAll(".size-btn");
      buttons.forEach(btn => btn.classList.remove("active"));

      button.classList.add("active");
    }

    function addToCart() {
      if (!currentProduct) {
        alert("Product loading. Please wait.");
        return;
      }

      const product = {
        id: currentProduct.id,
        name: currentProduct.name,
        price: Number(currentProduct.price),
        oldPrice: Number(currentProduct.old_price || currentProduct.price),
        size: selectedSize,
        quantity: 1,
        image: currentProduct.image_url,
        link: `https://babajanmart.com/product-detail.html?id=${currentProduct.id}`
      };

      localStorage.setItem("cartItem", JSON.stringify(product));

      window.location.href = "cart.html";
    }

    function checkPincode() {
      let pin = document.getElementById("pincode").value;
      let status = document.getElementById("pincode-status");

      if (pin === "222139" || pin.startsWith("222")) {
        status.innerText = "Fast Delivery available to Khetasarai & nearby areas!";
        status.style.color = "green";
      } else if (pin.length === 6) {
        status.innerText = "Delivery available within 4-7 days.";
        status.style.color = "blue";
      } else {
        status.innerText = "Please enter a valid 6 digit Indian pincode.";
        status.style.color = "red";
      }
    }

    loadProduct();
  </script>
</body>
</html>
