<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BABA JAAN MART · Your Cart</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #ffffff;
      color: #000000;
      line-height: 1.4;
    }

    /* premium yellow accent */
    :root {
      --yellow: #F5B041;
      --yellow-dark: #E67E22;
      --black: #000000;
      --white: #ffffff;
      --gray-50: #fafafa;
      --gray-100: #f5f5f5;
      --gray-200: #e5e5e5;
      --gray-700: #404040;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.03);
      --shadow-md: 0 8px 20px rgba(0,0,0,0.05);
    }

    /* black header - bold */
    .top-bar {
      background: #000000;
      color: white;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.75rem;
      border-bottom: 2px solid var(--yellow);
    }

    .brand {
      font-size: 1.65rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #FFFFFF 0%, #F5B041 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .continue-link {
      color: var(--yellow);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      border-bottom: 1px solid transparent;
      transition: 0.2s;
    }

    .continue-link:hover {
      border-bottom-color: var(--yellow);
    }

    /* main container */
    .cart-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* cart title */
    .cart-title {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 1rem;
      border-left: 6px solid var(--yellow);
      padding-left: 1rem;
    }

    /* two column layout on desktop: cart left + best sellers right */
    .cart-layout {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    @media (min-width: 992px) {
      .cart-layout {
        flex-direction: row;
        align-items: flex-start;
      }
      .cart-main {
        flex: 1.4;
      }
      .best-sellers-side {
        flex: 0.9;
        position: sticky;
        top: 1.5rem;
      }
    }

    /* cart items card */
    .cart-items {
      background: var(--white);
      border-radius: 24px;
      box-shadow: var(--shadow-md);
      margin-bottom: 2rem;
      overflow: hidden;
    }

    .cart-item {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1.5rem;
      border-bottom: 1px solid var(--gray-200);
      align-items: center;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .item-image {
      width: 85px;
      height: 85px;
      object-fit: cover;
      border-radius: 16px;
      background: var(--gray-100);
      flex-shrink: 0;
    }

    .item-details {
      flex: 2;
      min-width: 140px;
    }

    .item-name {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.2px;
      margin-bottom: 0.25rem;
    }

    .item-size {
      font-size: 0.8rem;
      color: var(--gray-700);
      text-transform: uppercase;
      background: var(--gray-100);
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
      margin: 0.4rem 0;
    }

    .item-prices {
      display: flex;
      gap: 0.75rem;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .current-price {
      font-weight: 800;
      font-size: 1.1rem;
    }

    .old-price {
      font-size: 0.85rem;
      text-decoration: line-through;
      color: #9ca3af;
    }

    .quantity-control {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--gray-100);
      padding: 0.2rem 0.4rem;
      border-radius: 40px;
    }

    .qty-btn {
      background: white;
      border: 1px solid var(--gray-200);
      width: 32px;
      height: 32px;
      border-radius: 40px;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.1s;
    }

    .qty-btn:hover {
      background: var(--yellow);
      border-color: var(--yellow);
      color: black;
    }

    .qty-number {
      font-weight: 600;
      min-width: 28px;
      text-align: center;
    }

    .item-total {
      font-weight: 800;
      font-size: 1.2rem;
      min-width: 85px;
      text-align: right;
    }

    .remove-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #999;
      transition: 0.2s;
      padding: 0 4px;
    }

    .remove-btn:hover {
      color: #e11d48;
    }

    /* summary & instructions */
    .cart-summary {
      background: var(--gray-50);
      border-radius: 24px;
      padding: 1.5rem;
      margin-top: 1rem;
    }

    .subtotal-row {
      display: flex;
      justify-content: space-between;
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 1rem;
      border-bottom: 2px dashed var(--gray-200);
      padding-bottom: 0.75rem;
    }

    .special-instructions {
      width: 100%;
      margin: 1rem 0 1.5rem;
      padding: 0.9rem;
      border-radius: 20px;
      border: 1px solid var(--gray-200);
      font-family: inherit;
      resize: vertical;
      font-size: 0.9rem;
    }

    .checkout-btn {
      background: #000000;
      color: white;
      width: 100%;
      padding: 1rem;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.3px;
    }

    .checkout-btn:hover {
      background: var(--yellow-dark);
      color: black;
      transform: scale(0.98);
    }

    /* empty state */
    .empty-cart {
      text-align: center;
      padding: 3rem 1rem;
      background: var(--gray-50);
      border-radius: 32px;
    }
    .empty-cart p {
      font-size: 1.3rem;
      margin-bottom: 1rem;
      font-weight: 500;
    }
    .shop-now-btn {
      background: black;
      color: white;
      padding: 0.8rem 2rem;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
    }

    /* BEST SELLERS (side section) */
    .best-sellers-side h3 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 1.2rem;
      display: inline-block;
      border-bottom: 3px solid var(--yellow);
    }
    .bestseller-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .bestseller-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: 0.2s;
      text-decoration: none;
      color: black;
      border: 1px solid var(--gray-100);
    }
    .bestseller-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.05);
    }
    .bestseller-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #f2f2f2;
    }
    .bestseller-info {
      padding: 0.7rem 0.6rem 0.9rem;
    }
    .bestseller-name {
      font-weight: 700;
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bestseller-price {
      font-weight: 800;
      font-size: 0.9rem;
      color: #000;
    }
    .bestseller-old {
      font-size: 0.7rem;
      text-decoration: line-through;
      color: #888;
      margin-left: 0.4rem;
    }
    @media (max-width: 480px) {
      .cart-container {
        padding: 1rem;
      }
      .cart-item {
        flex-direction: column;
        align-items: flex-start;
      }
      .item-total {
        text-align: left;
        width: 100%;
      }
      .quantity-control {
        margin-top: 0.3rem;
      }
      .cart-title {
        font-size: 1.7rem;
      }
    }

    .loading-spinner {
      text-align: center;
      padding: 2rem;
      color: #666;
    }
    hr {
      margin: 1rem 0;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <span class="brand">BABA JAAN MART</span>
  <a href="#" class="continue-link" id="continueShoppingLink">← CONTINUE SHOPPING</a>
</div>

<div class="cart-container">
  <div class="cart-layout">
    <!-- LEFT SECTION: CART MAIN -->
    <div class="cart-main">
      <h1 class="cart-title">YOUR CART</h1>
      <div id="cartItemsContainer">
        <!-- dynamic cart items or empty state -->
      </div>
      <div id="cartSummaryArea"></div>
    </div>

    <!-- RIGHT SECTION: BEST SELLERS -->
    <aside class="best-sellers-side">
      <h3>⚡ BEST SELLERS</h3>
      <div id="bestsellerGrid" class="bestseller-grid">
        <div class="loading-spinner">Loading favourites...</div>
      </div>
    </aside>
  </div>
</div>

<script>
  // ---------- SUPABASE CONFIG ----------
  const SUPABASE_URL = "https://kwslileixrznlycqjqoj.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3c2xpbGVpeHJ6bmx5Y3FqcW9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NTY2MDgsImV4cCI6MjA5NTIzMjYwOH0.t5j4URbC5iCOySScCyJpyq6ngYUAGt7P94fmK0bypLc";

  // Helper: fetch from Supabase (products table)
  async function fetchProducts() {
    const url = `${SUPABASE_URL}/rest/v1/products?select=*`;
    const response = await fetch(url, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      }
    });
    if (!response.ok) throw new Error('Failed to fetch products');
    const data = await response.json();
    return data;
  }

  // Cart storage key
  const STORAGE_KEY = 'bjm_cart';

  // Helper: get cart
  function getCart() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (!stored) return [];
    try {
      return JSON.parse(stored);
    } catch(e) { return []; }
  }

  // Save cart + re-render cart UI
  function saveCart(cart) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
    renderCartUI();
  }

  // Update quantity: id, size, delta (+1/-1)
  function updateQuantity(itemId, sizeVal, delta) {
    let cart = getCart();
    const index = cart.findIndex(item => item.id === itemId && item.size === sizeVal);
    if (index === -1) return;
    const newQty = cart[index].quantity + delta;
    if (newQty <= 0) {
      // remove item entirely
      cart.splice(index, 1);
    } else {
      cart[index].quantity = newQty;
    }
    saveCart(cart);
  }

  // Remove item fully
  function removeItem(itemId, sizeVal) {
    let cart = getCart();
    cart = cart.filter(item => !(item.id === itemId && item.size === sizeVal));
    saveCart(cart);
  }

  // Compute subtotal
  function computeSubtotal(cart) {
    return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
  }

  // Render cart items, empty state, summary + instructions
  function renderCartUI() {
    const cart = getCart();
    const container = document.getElementById('cartItemsContainer');
    const summaryArea = document.getElementById('cartSummaryArea');

    if (!cart.length) {
      container.innerHTML = `
        <div class="empty-cart">
          <p>🛒 Your cart is empty</p>
          <a href="#" id="shopNowBtnEmpty" class="shop-now-btn">SHOP NOW</a>
        </div>
      `;
      summaryArea.innerHTML = '';
      const shopBtn = document.getElementById('shopNowBtnEmpty');
      if (shopBtn) shopBtn.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = 'shop.html'; // fallback, but we can also go to index. For demo, or send to root
        // as per requirement, but continue shopping uses product listing. We assume user has shop.html or index.
        window.location.href = '/';
      });
      return;
    }

    // Render items
    let itemsHtml = `<div class="cart-items">`;
    cart.forEach(item => {
      const itemTotal = (item.price * item.quantity).toFixed(2);
      itemsHtml += `
        <div class="cart-item" data-id="${item.id}" data-size="${item.size}">
          <img class="item-image" src="${escapeHtml(item.image_url) || 'https://placehold.co/400x400?text=No+Image'}" alt="${escapeHtml(item.name)}" loading="lazy">
          <div class="item-details">
            <div class="item-name">${escapeHtml(item.name)}</div>
            <div class="item-size">Size: ${escapeHtml(item.size)}</div>
            <div class="item-prices">
              <span class="current-price">₹${item.price.toFixed(2)}</span>
              ${item.old_price ? `<span class="old-price">₹${item.old_price.toFixed(2)}</span>` : ''}
            </div>
          </div>
          <div class="quantity-control">
            <button class="qty-btn minus" data-id="${item.id}" data-size="${item.size}" data-delta="-1">−</button>
            <span class="qty-number">${item.quantity}</span>
            <button class="qty-btn plus" data-id="${item.id}" data-size="${item.size}" data-delta="1">+</button>
          </div>
          <div class="item-total">₹${itemTotal}</div>
          <button class="remove-btn" data-id="${item.id}" data-size="${item.size}" title="Remove">✕</button>
        </div>
      `;
    });
    itemsHtml += `</div>`;
    container.innerHTML = itemsHtml;

    // attach event listeners for +/- and remove
    document.querySelectorAll('.qty-btn.minus').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = btn.getAttribute('data-id');
        const size = btn.getAttribute('data-size');
        updateQuantity(id, size, -1);
      });
    });
    document.querySelectorAll('.qty-btn.plus').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = btn.getAttribute('data-id');
        const size = btn.getAttribute('data-size');
        updateQuantity(id, size, 1);
      });
    });
    document.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = btn.getAttribute('data-id');
        const size = btn.getAttribute('data-size');
        removeItem(id, size);
      });
    });

    const subtotal = computeSubtotal(cart);
    summaryArea.innerHTML = `
      <div class="cart-summary">
        <div class="subtotal-row">
          <span>SUBTOTAL</span>
          <span>₹${subtotal.toFixed(2)}</span>
        </div>
        <label style="font-weight:600; font-size:0.9rem;">ORDER SPECIAL INSTRUCTIONS</label>
        <textarea id="specialInstructions" class="special-instructions" rows="2" placeholder="Any notes? Delivery preferences?"></textarea>
        <button id="checkoutBtnMain" class="checkout-btn">PROCEED TO CHECKOUT →</button>
      </div>
    `;
    const storedInstructions = localStorage.getItem('bjm_cart_instructions');
    if (storedInstructions) {
      const textarea = document.getElementById('specialInstructions');
      if (textarea) textarea.value = storedInstructions;
    }
    const textareaInst = document.getElementById('specialInstructions');
    if (textareaInst) {
      textareaInst.addEventListener('input', (e) => {
        localStorage.setItem('bjm_cart_instructions', e.target.value);
      });
    }
    const checkoutBtn = document.getElementById('checkoutBtnMain');
    if (checkoutBtn) {
      checkoutBtn.addEventListener('click', () => {
        // save instructions before redirect
        const instr = document.getElementById('specialInstructions')?.value || '';
        localStorage.setItem('bjm_cart_instructions', instr);
        window.location.href = 'checkout.html';
      });
    }
  }

  // Render best sellers from supabase products table
  async function loadBestSellers() {
    const gridContainer = document.getElementById('bestsellerGrid');
    try {
      const products = await fetchProducts();
      // pick first 4 as "best sellers" (can also sort by id or random, but consistent)
      let bestSellers = [...products];
      // sort by id desc to get newer or just take first 4 after shuffle? maintain consistent top 4.
      bestSellers = bestSellers.slice(0, 4);
      if (!bestSellers.length) {
        gridContainer.innerHTML = '<div class="loading-spinner">No products found</div>';
        return;
      }
      let gridHtml = '';
      bestSellers.forEach(product => {
        const oldPriceHtml = product.old_price ? `<span class="bestseller-old">₹${Number(product.old_price).toFixed(2)}</span>` : '';
        gridHtml += `
          <a href="product-detail.html?id=${product.id}" class="bestseller-card">
            <img class="bestseller-img" src="${escapeHtml(product.image_url) || 'https://placehold.co/400x400?text=No+Img'}" alt="${escapeHtml(product.name)}" loading="lazy">
            <div class="bestseller-info">
              <div class="bestseller-name">${escapeHtml(product.name)}</div>
              <div class="bestseller-price">₹${Number(product.price).toFixed(2)} ${oldPriceHtml}</div>
            </div>
          </a>
        `;
      });
      gridContainer.innerHTML = gridHtml;
    } catch (error) {
      console.error(error);
      gridContainer.innerHTML = '<div class="loading-spinner">✨ Failed to load best sellers, but you can still shop.</div>';
    }
  }

  // helper escape HTML
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // Continue Shopping link (default goes to index or shop)
  function setupContinueShopping() {
    const link = document.getElementById('continueShoppingLink');
    if (link) {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        // Typically homepage or product listing, adjust if you have landing
        window.location.href = '/';
      });
    }
  }

  // Load initial cart and best sellers
  function init() {
    renderCartUI();
    loadBestSellers();
    setupContinueShopping();
    // Add observer for localstorage changes? not needed but ensure cross-tab same origin.
    window.addEventListener('storage', (e) => {
      if (e.key === STORAGE_KEY) {
        renderCartUI();
      }
    });
  }

  init();
</script>
</body>
</html>
