<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BABA JAAN MART · Luxury Cart</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      line-height: 1.5;
    }

    :root {
      --gold: #D4AF37;
      --gold-dark: #B49450;
      --gold-light: #F3E5AB;
      --black: #000000;
      --black-soft: #111111;
      --black-card: rgba(15, 15, 15, 0.85);
      --glass-border: rgba(212, 175, 55, 0.25);
      --white: #ffffff;
      --gray-300: #2a2a2a;
      --gray-400: #3a3a3a;
      --shadow-xl: 0 25px 40px -12px rgba(0, 0, 0, 0.5);
      --backdrop-blur: blur(12px);
    }

    /* premium navbar */
    .navbar {
      background: rgba(0, 0, 0, 0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--glass-border);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 1rem 2rem;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-img {
      height: 44px;
      width: auto;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }

    .brand-text {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #D4AF37 0%, #F3E5AB 70%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-links a {
      color: #f0f0f0;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: 0.2s;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-links a:hover {
      color: var(--gold);
    }

    .icon-svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
    }

    .icon-svg-fill {
      fill: none;
      stroke: currentColor;
    }

    .cart-counter, .wishlist-counter {
      background: var(--gold);
      color: black;
      font-size: 0.7rem;
      font-weight: 800;
      border-radius: 40px;
      padding: 0.15rem 0.45rem;
      margin-left: 4px;
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: 1px solid var(--gold);
      padding: 0.4rem 0.8rem;
      border-radius: 12px;
      color: var(--gold);
      cursor: pointer;
    }

    @media (max-width: 780px) {
      .nav-links {
        display: none;
        width: 100%;
        flex-direction: column;
        padding: 1rem 0;
        gap: 1rem;
      }
      .nav-links.show-mobile {
        display: flex;
      }
      .mobile-menu-btn {
        display: block;
      }
      .navbar {
        padding: 1rem;
      }
    }

    /* main container */
    .cart-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.8rem;
    }

    /* cart title gold */
    .cart-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1.8rem;
      border-left: 5px solid var(--gold);
      padding-left: 1.2rem;
      letter-spacing: -0.2px;
      color: #fff;
    }

    /* two column layout */
    .cart-layout {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    @media (min-width: 1024px) {
      .cart-layout {
        flex-direction: row;
        align-items: flex-start;
      }
      .cart-main {
        flex: 1.5;
      }
      .best-sellers-side {
        flex: 1;
        position: sticky;
        top: 100px;
      }
    }

    /* glass card for cart items */
    .cart-items {
      background: var(--black-card);
      backdrop-filter: var(--backdrop-blur);
      border-radius: 28px;
      border: 1px solid rgba(212, 175, 55, 0.25);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .cart-item {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      padding: 1.6rem;
      border-bottom: 1px solid rgba(212, 175, 55, 0.15);
      align-items: center;
      transition: 0.2s;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .item-image {
      width: 95px;
      height: 95px;
      object-fit: cover;
      border-radius: 20px;
      background: #1e1e1e;
      border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .item-details {
      flex: 2;
      min-width: 150px;
    }

    .item-name {
      font-weight: 700;
      font-size: 1.1rem;
      color: white;
      margin-bottom: 6px;
    }

    .item-size {
      font-size: 0.75rem;
      color: var(--gold);
      text-transform: uppercase;
      background: rgba(212, 175, 55, 0.12);
      display: inline-block;
      padding: 0.2rem 0.7rem;
      border-radius: 30px;
      letter-spacing: 0.5px;
    }

    .item-prices {
      display: flex;
      gap: 0.8rem;
      align-items: baseline;
      margin-top: 8px;
    }

    .current-price {
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--gold);
    }

    .old-price {
      font-size: 0.85rem;
      text-decoration: line-through;
      color: #8a8a8a;
    }

    /* premium quantity selector */
    .quantity-control {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: #1e1e1e;
      padding: 0.2rem;
      border-radius: 60px;
      border: 1px solid rgba(212, 175, 55, 0.4);
    }

    .qty-btn {
      background: transparent;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 40px;
      font-size: 1.3rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--gold);
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .qty-btn:hover {
      background: var(--gold);
      color: black;
    }

    .qty-number {
      font-weight: 600;
      min-width: 32px;
      text-align: center;
      color: white;
      font-size: 1rem;
    }

    .item-total {
      font-weight: 800;
      font-size: 1.2rem;
      color: white;
      min-width: 95px;
      text-align: right;
    }

    .remove-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(212, 175, 55, 0.3);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      color: #bbbbbb;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .remove-btn:hover {
      background: #b91c1c;
      color: white;
      border-color: #b91c1c;
    }

    /* summary glass + sticky */
    .cart-summary {
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 1.8rem;
      border: 1px solid rgba(212, 175, 55, 0.3);
      margin-top: 1rem;
    }

    .subtotal-row {
      display: flex;
      justify-content: space-between;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      border-bottom: 1px dashed rgba(212, 175, 55, 0.4);
      padding-bottom: 0.8rem;
      color: white;
    }

    .special-instructions {
      width: 100%;
      margin: 1rem 0 1.2rem;
      padding: 0.9rem;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: #141414;
      font-family: inherit;
      resize: vertical;
      font-size: 0.9rem;
      color: white;
    }

    .special-instructions:focus {
      outline: none;
      border-color: var(--gold);
    }

    .checkout-btn {
      background: linear-gradient(95deg, #D4AF37 0%, #B49450 100%);
      color: black;
      width: 100%;
      padding: 1rem;
      font-weight: 800;
      font-size: 1rem;
      border: none;
      border-radius: 44px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      justify-content: center;
      gap: 10px;
      letter-spacing: 0.5px;
      margin-bottom: 1.5rem;
    }

    .checkout-btn:hover {
      transform: scale(0.98);
      background: linear-gradient(95deg, #e6c258, #c49f42);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
    }

    /* trust seals */
    .trust-seals {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.9rem;
      margin-top: 1rem;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      font-weight: 500;
      background: rgba(212, 175, 55, 0.08);
      padding: 0.65rem;
      border-radius: 40px;
      color: #ddd;
    }

    .trust-svg {
      width: 20px;
      height: 20px;
      stroke: var(--gold);
      fill: none;
    }

    /* empty cart premium */
    .empty-cart {
      text-align: center;
      padding: 3rem 1.5rem;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      border: 1px solid var(--glass-border);
    }
    .empty-icon {
      width: 90px;
      margin-bottom: 1rem;
      opacity: 0.7;
    }
    .empty-cart p {
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }
    .shop-now-btn {
      background: var(--gold);
      color: black;
      padding: 0.9rem 2.2rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 800;
      display: inline-block;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: 0.2s;
    }
    .shop-now-btn:hover {
      background: var(--gold-dark);
      transform: translateY(-2px);
    }

    /* BEST SELLERS (modern cards like shop) */
    .best-sellers-side h3 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 1.3rem;
      color: white;
      display: inline-block;
      border-bottom: 3px solid var(--gold);
      padding-bottom: 4px;
    }
    .bestseller-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
    }
    .bestseller-card {
      background: rgba(15, 15, 15, 0.7);
      backdrop-filter: blur(6px);
      border-radius: 24px;
      overflow: hidden;
      transition: 0.25s ease;
      text-decoration: none;
      color: white;
      border: 1px solid rgba(212, 175, 55, 0.25);
    }
    .bestseller-card:hover {
      transform: translateY(-6px);
      border-color: var(--gold);
      box-shadow: 0 16px 28px -12px rgba(0,0,0,0.6);
    }
    .bestseller-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #1c1c1c;
    }
    .bestseller-info {
      padding: 0.8rem 0.8rem 1rem;
    }
    .bestseller-name {
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bestseller-price {
      font-weight: 800;
      font-size: 1rem;
      color: var(--gold);
      margin-top: 4px;
    }
    .bestseller-old {
      font-size: 0.7rem;
      text-decoration: line-through;
      color: #9ca3af;
      margin-left: 0.4rem;
    }

    /* FOOTER premium */
    .premium-footer {
      margin-top: 4rem;
      background: #020202;
      border-top: 1px solid rgba(212, 175, 55, 0.3);
      padding: 2.5rem 2rem 1.5rem;
    }
    .footer-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 2rem;
    }
    .footer-brand h4 {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #D4AF37, #F3E5AB);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }
    .social-links {
      display: flex;
      gap: 1.5rem;
      margin-top: 0.8rem;
    }
    .social-links a {
      color: #aaa;
      transition: 0.2s;
    }
    .social-links a:hover {
      color: var(--gold);
    }
    .footer-copyright {
      text-align: center;
      padding-top: 2rem;
      font-size: 0.8rem;
      color: #6b6b6b;
    }

    @media (max-width: 640px) {
      .cart-container {
        padding: 1rem;
      }
      .cart-item {
        flex-direction: column;
        align-items: flex-start;
      }
      .item-total {
        text-align: left;
        width: 100%;
      }
      .bestseller-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>

<div class="cart-container">
  <div class="cart-layout">
    <!-- LEFT CART SECTION -->
    <div class="cart-main">
      <h1 class="cart-title">SHOPPING CART</h1>
      <div id="cartItemsContainer"></div>
      <div id="cartSummaryArea"></div>

    <!-- BEST SELLERS SIDEBAR -->
    <aside class="best-sellers-side">
      <h3>✦ BEST SELLERS</h3>
      <div id="bestsellerGrid" class="bestseller-grid">

  <div class="footer-inner">
    <div class="footer-brand">
      <h4>BABA JAAN MART</h4>
      <p style="font-size:0.8rem; color:#aaa;">Luxury essentials for the modern connoisseur</p>

<script>
  // ---------- SUPABASE CONFIG (unchanged) ----------
  const SUPABASE_URL = "https://kwslileixrznlycqjqoj.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3c2xpbGVpeHJ6bmx5Y3FqcW9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NTY2MDgsImV4cCI6MjA5NTIzMjYwOH0.t5j4URbC5iCOySScCyJpyq6ngYUAGt7P94fmK0bypLc";

  async function fetchProducts() {
    const url = `${SUPABASE_URL}/rest/v1/products?select=*`;
    const response = await fetch(url, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      }
    });
    if (!response.ok) throw new Error('Failed to fetch products');
    return await response.json();
  }

  const STORAGE_KEY = 'bjm_cart';
  function getCart() {
    const stored = localStorage.getItem(STORAGE_KEY);
    return stored ? JSON.parse(stored) : [];
  }
  function saveCart(cart) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
    renderCartUI();
    updateNavCounters();
  }

  function updateQuantity(itemId, sizeVal, delta) {
    let cart = getCart();
    const index = cart.findIndex(item => String(item.id) === String(itemId) && item.size === sizeVal);
    if (index === -1) return;
    const newQty = cart[index].quantity + delta;
    if (newQty <= 0) cart.splice(index, 1);
    else cart[index].quantity = newQty;
    saveCart(cart);
  }

  function removeItem(itemId, sizeVal) {
    let cart = getCart();
    cart = cart.filter(item => !(String(item.id) === String(itemId) && item.size === sizeVal));
    saveCart(cart);
  }

  function computeSubtotal(cart) {
    return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
  }

  // Indian price formatting (no .00 if whole number)
  function formatInr(amount) {
    let rounded = Math.round(amount);
    return `₹${rounded.toLocaleString('en-IN')}`;
  }

  function renderCartUI() {
    const cart = getCart();
    const container = document.getElementById('cartItemsContainer');
    const summaryArea = document.getElementById('cartSummaryArea');

    if (!cart.length) {
      container.innerHTML = `
        <div class="empty-cart">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          <p>Your collection is empty</p>
          <button id="shopNowBtnEmpty" class="shop-now-btn">DISCOVER ELEGANCE →</button>
        </div>
      `;
      summaryArea.innerHTML = '';
      const shopBtn = document.getElementById('shopNowBtnEmpty');
      if (shopBtn) shopBtn.addEventListener('click', () => window.location.href = 'shop.html');
      return;
    }

    let itemsHtml = `<div class="cart-items">`;
    cart.forEach(item => {
      const itemTotal = item.price * item.quantity;
      itemsHtml += `
        <div class="cart-item">
          <img class="item-image" src="${escapeHtml(item.image_url) || 'https://placehold.co/400x400?text=Luxury'}" alt="${escapeHtml(item.name)}">
          <div class="item-details">
            <div class="item-name">${escapeHtml(item.name)}</div>
            <div class="item-size">Size: ${escapeHtml(item.size)}</div>
            <div class="item-prices">
              <span class="current-price">${formatInr(item.price)}</span>
              ${item.old_price ? `<span class="old-price">${formatInr(item.old_price)}</span>` : ''}
            </div>
          </div>
          <div class="quantity-control">
            <button class="qty-btn minus" data-id="${item.id}" data-size="${item.size}" data-delta="-1">−</button>
            <span class="qty-number">${item.quantity}</span>
            <button class="qty-btn plus" data-id="${item.id}" data-size="${item.size}" data-delta="1">+</button>
          </div>
          <div class="item-total">${formatInr(itemTotal)}</div>
          <button class="remove-btn" data-id="${item.id}" data-size="${item.size}" title="Remove">✕</button>
        </div>
      `;
    });
    itemsHtml += `</div>`;
    container.innerHTML = itemsHtml;

    document.querySelectorAll('.qty-btn.minus').forEach(btn => {
      btn.addEventListener('click', () => updateQuantity(btn.dataset.id, btn.dataset.size, -1));
    });
    document.querySelectorAll('.qty-btn.plus').forEach(btn => {
      btn.addEventListener('click', () => updateQuantity(btn.dataset.id, btn.dataset.size, 1));
    });
    document.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => removeItem(btn.dataset.id, btn.dataset.size));
    });

    const subtotal = computeSubtotal(cart);
    summaryArea.innerHTML = `
      <div class="cart-summary">
        <div class="subtotal-row"><span>SUBTOTAL</span><span>${formatInr(subtotal)}</span></div>
        <label style="font-weight:600; font-size:0.85rem; color:#D4AF37;">SPECIAL INSTRUCTIONS</label>
        <textarea id="specialInstructions" class="special-instructions" rows="2" placeholder="Delivery preferences? Fragile items?"></textarea>
        <button id="checkoutBtnMain" class="checkout-btn">SECURE CHECKOUT →</button>
        <div class="trust-seals">
          <div class="trust-item"><svg class="trust-svg" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 2L15 8.5L22 9.5L17 14L18.5 21L12 17.5L5.5 21L7 14L2 9.5L9 8.5L12 2z"/></svg>Razorpay Secure</div>
          <div class="trust-item"><svg class="trust-svg" viewBox="0 0 24 24" stroke="currentColor"><path d="M20 12v8H4v-8M12 2v12m-3-3l3 3 3-3"/></svg>Premium Quality</div>
          <div class="trust-item"><svg class="trust-svg" viewBox="0 0 24 24" stroke="currentColor"><path d="M20 6L9 17l-5-5"/></svg>7-Day Returns</div>
          <div class="trust-item"><svg class="trust-svg" viewBox="0 0 24 24" stroke="currentColor"><path d="M21 10.5V19a2 2 0 01-2 2H5a2 2 0 01-2-2v-8.5"/><path d="M2 10.5L12 3l10 7.5"/></svg>Order Support</div>
        </div>
      </div>
    `;
    const storedInstructions = localStorage.getItem('bjm_cart_instructions');
    const textarea = document.getElementById('specialInstructions');
    if (textarea && storedInstructions) textarea.value = storedInstructions;
    if (textarea) {
      textarea.addEventListener('input', (e) => localStorage.setItem('bjm_cart_instructions', e.target.value));
    }
    const checkoutBtn = document.getElementById('checkoutBtnMain');
    if (checkoutBtn) {
      checkoutBtn.addEventListener('click', () => {
        const instr = document.getElementById('specialInstructions')?.value || '';
        localStorage.setItem('bjm_cart_instructions', instr);
        window.location.href = 'checkout.html';
      });
    }
  }

  async function loadBestSellers() {
    const grid = document.getElementById('bestsellerGrid');
    try {
      const products = await fetchProducts();
      const best = products.slice(0, 4);
      if (!best.length) { grid.innerHTML = '<div class="loading-spinner">No picks</div>'; return; }
      let html = '';
      best.forEach(p => {
        html += `
          <a href="product-detail.html?id=${p.id}" class="bestseller-card">
            <img class="bestseller-img" src="${escapeHtml(p.image_url) || 'https://placehold.co/400x400?text=Luxury'}" alt="${escapeHtml(p.name)}">
            <div class="bestseller-info">
              <div class="bestseller-name">${escapeHtml(p.name)}</div>
              <div class="bestseller-price">${formatInr(p.price)} ${p.old_price ? `<span class="bestseller-old">${formatInr(p.old_price)}</span>` : ''}</div>
            </div>
          </a>
        `;
      });
      grid.innerHTML = html;
    } catch(e) { grid.innerHTML = '<div class="loading-spinner">✨ Reload bestsellers later</div>'; }
  }

  function updateNavCounters() {
    const cartCount = getCart().reduce((sum, i) => sum + i.quantity, 0);
    const cartSpan = document.getElementById('cartCounterNav');
    if (cartSpan) cartSpan.innerText = cartCount;
    const wishlistRaw = localStorage.getItem('bjm_wishlist');
    let wishCount = 0;
    if (wishlistRaw) {
      try { wishCount = JSON.parse(wishlistRaw).length; } catch(e) {}
    }
    const wishSpan = document.getElementById('wishlistCounterNav');
    if (wishSpan) wishSpan.innerText = wishCount;
  }

  function setupMobileMenu() {
    const btn = document.getElementById('mobileMenuToggle');
    const navLinks = document.getElementById('navLinks');
    if (btn && navLinks) {
      btn.addEventListener('click', () => navLinks.classList.toggle('show-mobile'));
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function init() {
    renderCartUI();
    loadBestSellers();
    setupMobileMenu();
    updateNavCounters();
    window.addEventListener('storage', (e) => {
      if (e.key === STORAGE_KEY) renderCartUI();
      if (e.key === 'bjm_wishlist') updateNavCounters();
    });
    const contLink = document.getElementById('continueShoppingLink');
    if (contLink) contLink.addEventListener('click', (e) => { e.preventDefault(); window.location.href = 'shop.html'; });
  }
  init();
</script>
</body>
</html>
