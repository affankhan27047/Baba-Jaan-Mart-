<!DOCTYPE html>
<html>
<head>
    <title>BABA JAAN MART - Admin Panel</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body{
            font-family:Arial,sans-serif;
            padding:20px;
            background:#f5f5f5;
        }

        h1{
            text-align:center;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            border:1px solid #ddd;
            padding:10px;
            text-align:left;
        }

        th{
            background:black;
            color:white;
        }

        tr:nth-child(even){
            background:#fafafa;
        }
    </style>
</head>

<body>

<h1>BABA JAAN MART ORDERS</h1>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>City</th>
            <th>Amount</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody id="ordersTable">
    </tbody>
</table>

<script>

const supabase = window.supabase.createClient(
    "https://kwslileixrznlycqjqoj.supabase.co",
    "sb_publishable_gFXTHh-8OEcI5O-YbAT9rQ_n5LJTTMv"
);

async function loadOrders(){

    const { data, error } = await supabase
    .from("orders")
    .select("*")
    .order("id",{ascending:false});

    if(error){
        console.log(error);
        return;
    }

    let html="";

    data.forEach(order=>{

        html += `
        <tr>
            <td>${order.customer_name}</td>
            <td>${order.phone}</td>
            <td>${order.city}</td>
            <td>₹${order.total_amount}</td>
            <td>${order.order_status}</td>
        </tr>
        `;

    });

    document.getElementById("ordersTable").innerHTML = html;
}

loadOrders();

</script>

</body>
</html>
