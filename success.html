.box{
    background:#fff;
    padding:40px;

    display:inline-block;
    margin-top:20px;
    padding:12px 25px;

    color:#000;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
    <div class="check">✅</div>

    <h1>Order Placed Successfully!</h1>
