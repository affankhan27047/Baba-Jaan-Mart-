<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Order Successful · BABA JAAN MART</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #F5B041;
      --gold-dark: #D4920F;
      --bg: #0a0a0a;
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(245,176,65,0.22);
      --text: #f0f0f0;
      --text-muted: #888;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND GLOW ── */
    body::before {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(245,176,65,0.09) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAVBAR ── */
    nav {
      position: relative;
      z-index: 10;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      text-decoration: none;
    }
    .nav-logo img {
      height: 32px;
      width: 32px;
      object-fit: contain;
      border-radius: 7px;
    }
    .nav-logo-text {
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(130deg, #fff 0%, var(--gold) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-logo-fallback {
      display: none;
      height: 32px;
      width: 32px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      border-radius: 7px;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 900;
      color: #000;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.25rem;
      position: relative;
      z-index: 1;
    }

    /* ── CARD ── */
    .success-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: relative;
      animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* gold top edge */
    .success-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 1px;
    }

    /* ── ICON ── */
    .success-icon-wrap {
      width: 88px;
      height: 88px;
      margin: 0 auto 1.75rem;
      border-radius: 50%;
      background: rgba(245,176,65,0.1);
      border: 1.5px solid rgba(245,176,65,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: iconPop 0.5s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes iconPop {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }
    .success-icon-wrap svg {
      animation: checkDraw 0.5s 0.45s ease both;
    }
    @keyframes checkDraw {
      from { opacity: 0; transform: scale(0.7) rotate(-10deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* ── TEXT ── */
    .success-card h1 {
      font-size: 1.55rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(130deg, #fff 20%, var(--gold) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.85rem;
      animation: fadeUp 0.4s 0.3s ease both;
    }
    .success-card p {
      color: var(--text-muted);
      font-size: 0.92rem;
      line-height: 1.65;
      margin-bottom: 0.5rem;
      animation: fadeUp 0.4s 0.38s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── DIVIDER ── */
    .card-divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 1.75rem 0 1.5rem;
    }

    /* ── BUTTONS ── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      animation: fadeUp 0.4s 0.5s ease both;
    }
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.9rem 1.5rem;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      color: #000;
      font-weight: 800;
      font-size: 0.92rem;
      letter-spacing: 0.02em;
      text-decoration: none;
      border-radius: 50px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(245,176,65,0.28);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(245,176,65,0.42);
    }
    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.9rem 1.5rem;
      background: rgba(255,255,255,0.05);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.92rem;
      text-decoration: none;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.09);
      color: var(--text);
      border-color: rgba(245,176,65,0.3);
    }

    /* ── TRUST LINE ── */
    .trust-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 1.5rem;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      animation: fadeUp 0.4s 0.6s ease both;
    }
    .trust-line svg { color: var(--gold); flex-shrink: 0; }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    footer p {
      font-size: 0.75rem;
      color: #444;
    }

    @media (max-width: 520px) {
      .success-card { padding: 2rem 1.5rem; border-radius: 20px; }
      .success-card h1 { font-size: 1.3rem; }
      .success-icon-wrap { width: 72px; height: 72px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="images/bjm-logo.png" alt="BJM Logo"
         onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';">
    <span class="nav-logo-fallback" id="logoFallback">BJM</span>
    <span class="nav-logo-text">BABA JAAN MART</span>
  </a>
</nav>

<main>
  <div class="success-card">

    <!-- Success Icon -->
    <div class="success-icon-wrap">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
           stroke="var(--gold)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>

    <h1>Order Placed Successfully!</h1>
    <p>Thank you for shopping with BABA JAAN MART.<br>
       Your payment has been received and your order is being processed.</p>

    <div class="card-divider"></div>

    <div class="btn-group">
      <a href="shop.html" class="btn-primary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        Continue Shopping
      </a>
      <a href="index.html" class="btn-secondary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Home
      </a>
    </div>

    <div class="trust-line">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Secure payment powered by Razorpay
    </div>

  </div>
</main>

<footer>
  <p>© 2026 BABA JAAN MART. All rights reserved.</p>
</footer>

</body>
</html>
